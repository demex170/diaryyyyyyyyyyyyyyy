<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deme & Nini Private Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Noto+Sans+Georgian:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Georgian', sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 375px;
            height: 780px;
            background: #1f1f1f;
            border-radius: 55px;
            padding: 12px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            position: relative;
            border: 4px solid #2a2a2a;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 43px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(to bottom, #fdfbfb, #ebedee);
        }

        .status-bar {
            height: 45px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px; height: 28px;
            background: #1f1f1f;
            border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
            z-index: 10;
        }

        /* ტაბების გადასართველი */
        .tabs {
            display: flex;
            background: #eee;
            margin: 10px 20px;
            border-radius: 15px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: 0.3s;
            background: transparent;
            color: #777;
        }

        .tab-btn.active {
            background: white;
            color: #ff5e78;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .app-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff5e78; }

        .diary-form { display: none; }
        .diary-form.active { display: block; animation: fadeIn 0.5s; }

        .diary-input {
            width: 100%;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            font-family: inherit;
            outline: none;
        }

        textarea { height: 280px; resize: none; }

        .save-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ფერები ნინისთვის და დემესთვის */
        .nini-btn { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
        .deme-btn { background: linear-gradient(135deg, #4facfe, #00f2fe); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .home-indicator { height: 5px; width: 120px; background: #000; margin: 10px auto; border-radius: 10px; opacity: 0.1; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="notch"></div>
        <div class="phone-screen">
            <div class="status-bar">
                <span id="phone-time">00:00</span>
                <span>📶 🔋</span>
            </div>

            <header>
                <h1 id="diary-title">ნინის დღიური</h1>
            </header>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchDiary('nini')">ნინი</button>
                <button class="tab-btn" onclick="switchDiary('deme')">დემე</button>
            </div>

            <div class="app-content">
                <form id="nini-form" class="diary-form active" action="https://formspree.io/f/ჩასვი_ნინის_ლინკი" method="POST">
                    <input type="text" name="სათაური" class="diary-input" placeholder="ნინის სათაური..." required>
                    <textarea name="ჩანაწერი" class="diary-input" placeholder="რას ფიქრობ, ნინი?.." required></textarea>
                    <button type="submit" class="save-btn nini-btn">ნინის ჩანაწერის შენახვა ✨</button>
                </form>

                <form id="deme-form" class="diary-form" action="https://formspree.io/f/mzdyvdap" method="POST">
                    <input type="text" name="სათაური" class="diary-input" placeholder="დემეს სათაური..." required>
                    <textarea name="ჩანაწერი" class="diary-input" placeholder="რა მოხდა დღეს?.." required></textarea>
                    <button type="submit" class="save-btn deme-btn">დემეს ჩანაწერის შენახვა 🚀</button>
                </form>
            </div>

            <div class="home-indicator"></div>
        </div>
    </div>

    <script>
        function switchDiary(person) {
            // ღილაკების გააქტიურება
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // ფორმების გამოჩენა/დამალვა
            document.getElementById('nini-form').classList.remove('active');
            document.getElementById('deme-form').classList.remove('active');
            
            if(person === 'nini') {
                document.getElementById('nini-form').classList.add('active');
                document.getElementById('diary-title').innerText = "ნინის დღიური";
                document.getElementById('diary-title').style.color = "#ff5e78";
            } else {
                document.getElementById('deme-form').classList.add('active');
                document.getElementById('diary-title').innerText = "დემეს დღიური";
                document.getElementById('diary-title').style.color = "#4facfe";
            }
        }

        // საათის განახლება
        setInterval(() => {
            const now = new Date();
            document.getElementById('phone-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
